<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC Factory — Autonomous Startup Factory</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Press Start 2P', monospace;
    overflow-x: hidden;
    background: #5c94fc;
    min-height: 100vh;
  }

  /* ── SKY with clouds (Mario style) ── */
  .sky {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 700px;
    background: linear-gradient(180deg, #5c94fc 0%, #88b4fc 60%, #a4d4fc 100%);
    overflow: hidden;
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: #fff;
    border-radius: 0;
    opacity: 0.9;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: #fff;
  }
  .cloud-1 { width: 80px; height: 32px; top: 8%; left: 10%; animation: drift 30s linear infinite; }
  .cloud-1::before { width: 40px; height: 24px; top: -16px; left: 12px; }
  .cloud-1::after { width: 32px; height: 20px; top: -12px; left: 40px; }
  .cloud-2 { width: 64px; height: 28px; top: 12%; left: 55%; animation: drift 35s linear infinite; animation-delay: -10s; }
  .cloud-2::before { width: 36px; height: 20px; top: -14px; left: 8px; }
  .cloud-2::after { width: 28px; height: 16px; top: -10px; left: 30px; }
  .cloud-3 { width: 72px; height: 28px; top: 6%; left: 80%; animation: drift 25s linear infinite; animation-delay: -5s; }
  .cloud-3::before { width: 38px; height: 22px; top: -14px; left: 10px; }
  .cloud-3::after { width: 30px; height: 18px; top: -12px; left: 36px; }

  @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-120vw); } }

  /* ── TITLE ── */
  .title-block {
    position: absolute;
    top: 4%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
  }

  .title {
    font-size: clamp(1rem, 3vw, 2rem);
    color: #fff;
    text-shadow: 3px 3px 0 #333, -1px -1px 0 #333;
    letter-spacing: 4px;
  }

  .subtitle {
    font-size: clamp(0.5rem, 1.2vw, 0.7rem);
    color: #ffd700;
    text-shadow: 2px 2px 0 #333;
    margin-top: 8px;
    letter-spacing: 2px;
  }

  /* ── GROUND ── */
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 120px;
    background: #c84c0c;
    border-top: 8px solid #e09040;
  }
  .ground::before {
    content: '';
    position: absolute;
    top: -8px;
    width: 100%;
    height: 8px;
    background: repeating-linear-gradient(90deg, #e09040 0px, #e09040 32px, #c84c0c 32px, #c84c0c 64px);
  }

  .grass {
    position: absolute;
    bottom: 120px;
    width: 100%;
    height: 24px;
    background: #00a800;
    border-top: 4px solid #30d030;
  }

  /* ── HILLS ── */
  .hill {
    position: absolute;
    bottom: 144px;
    border-radius: 50% 50% 0 0;
    background: #30a030;
  }
  .hill-1 { width: 200px; height: 80px; left: 5%; }
  .hill-2 { width: 140px; height: 56px; left: 70%; }
  .hill-3 { width: 100px; height: 40px; left: 42%; }

  /* ── PIPES (Mario green pipes = GStack stages) ── */
  .pipe {
    position: absolute;
    bottom: 144px;
    z-index: 5;
  }

  .pipe-body {
    width: 48px;
    height: 80px;
    background: #00a800;
    border: 4px solid #006800;
    margin: 0 auto;
  }

  .pipe-top {
    width: 60px;
    height: 20px;
    background: #00c800;
    border: 4px solid #006800;
    margin: 0 auto;
  }

  .pipe-label {
    text-align: center;
    font-size: clamp(0.35rem, 0.8vw, 0.5rem);
    color: #fff;
    text-shadow: 1px 1px 0 #333;
    margin-top: 4px;
    line-height: 1.4;
    white-space: nowrap;
  }

  .pipe:nth-child(1) { left: 8%; }
  .pipe:nth-child(2) { left: 24%; }
  .pipe:nth-child(3) { left: 40%; }
  .pipe:nth-child(4) { left: 56%; }

  /* ── CASTLE (VIP Lounge) ── */
  .castle {
    position: absolute;
    right: 4%;
    bottom: 144px;
    z-index: 5;
  }

  .castle-body {
    width: 100px;
    height: 100px;
    background: #e0a060;
    border: 4px solid #c08040;
    position: relative;
  }

  .castle-door {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 36px;
    background: #333;
    border-radius: 14px 14px 0 0;
  }

  .castle-tower {
    position: absolute;
    top: -40px;
    width: 32px;
    height: 40px;
    background: #e0a060;
    border: 4px solid #c08040;
  }
  .castle-tower-l { left: -4px; }
  .castle-tower-r { right: -4px; }

  .castle-flag {
    position: absolute;
    top: -56px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 24px;
    background: #333;
  }
  .castle-flag::after {
    content: '▸';
    position: absolute;
    top: 0;
    left: 4px;
    color: #ff4444;
    font-size: 1rem;
    font-family: sans-serif;
  }

  .castle-label {
    text-align: center;
    font-size: clamp(0.35rem, 0.7vw, 0.45rem);
    color: #fff;
    text-shadow: 1px 1px 0 #333;
    margin-top: 4px;
    line-height: 1.6;
  }

  .castle-vc {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.35rem;
    color: #ffd700;
    text-shadow: 1px 1px 0 #333;
    text-align: center;
    line-height: 2;
    white-space: nowrap;
  }

  /* ── STARTUP IDEAS (items falling into pipes) ── */
  .idea-item {
    position: absolute;
    z-index: 8;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.35rem;
    color: #fff;
    text-shadow: 1px 1px 0 #000;
    text-align: center;
    line-height: 1.3;
    border: 3px solid;
    animation: idea-to-pipe 6s ease-in infinite;
    opacity: 0;
  }

  .idea-item.i1 { left: 9%; background: rgba(92,148,252,0.9); border-color: #4488ff; animation-delay: 0s; }
  .idea-item.i2 { left: 25%; background: rgba(170,68,255,0.9); border-color: #aa44ff; animation-delay: 1.5s; }
  .idea-item.i3 { left: 41%; background: rgba(255,170,0,0.9); border-color: #ffaa00; animation-delay: 3s; }
  .idea-item.i4 { left: 57%; background: rgba(0,200,100,0.9); border-color: #00c864; animation-delay: 4.5s; }

  @keyframes idea-to-pipe {
    0% { top: 15%; opacity: 0; }
    15% { top: 15%; opacity: 1; }
    60% { top: calc(100% - 280px); opacity: 1; }
    75% { top: calc(100% - 240px); opacity: 0.6; }
    85% { top: calc(100% - 200px); opacity: 0; }
    100% { opacity: 0; }
  }

  /* ── PRODUCT (exits last pipe, walks to castle) ── */
  .product {
    position: absolute;
    bottom: 148px;
    z-index: 8;
    width: 28px;
    height: 28px;
    background: #ffd700;
    border: 3px solid #cc9900;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    animation: product-walk 8s linear infinite;
    opacity: 0;
  }

  @keyframes product-walk {
    0% { left: 58%; opacity: 0; }
    10% { left: 58%; opacity: 1; }
    80% { left: calc(100% - 8% - 50px); opacity: 1; }
    90% { left: calc(100% - 8% - 50px); opacity: 0.5; }
    100% { opacity: 0; }
  }

  /* ── REJECTED (falls off screen) ── */
  .rejected {
    position: absolute;
    bottom: 160px;
    z-index: 8;
    width: 24px;
    height: 24px;
    background: #ff4444;
    border: 3px solid #cc2222;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: #fff;
    animation: rejected-fall 7s ease-in infinite;
    opacity: 0;
  }

  .rejected.r1 { left: 18%; animation-delay: 2s; }
  .rejected.r2 { left: 34%; animation-delay: 5s; }

  @keyframes rejected-fall {
    0% { opacity: 0; transform: translateY(0) rotate(0); }
    10% { opacity: 1; }
    30% { transform: translateY(-40px) rotate(0); opacity: 1; }
    60% { transform: translateY(100px) rotate(180deg); opacity: 0.5; }
    70% { opacity: 0; }
    100% { opacity: 0; }
  }

  /* ── QUESTION BLOCKS ── */
  .q-block {
    position: absolute;
    width: 32px;
    height: 32px;
    background: #e09040;
    border: 3px solid #c87020;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    color: #fff;
    text-shadow: 1px 1px 0 #333;
    z-index: 3;
  }
  .q-block::after { content: '?'; }
  .q1 { top: 28%; left: 15%; animation: block-bob 2s ease-in-out infinite; }
  .q2 { top: 32%; left: 48%; animation: block-bob 2s ease-in-out infinite; animation-delay: 0.7s; }
  .q3 { top: 26%; left: 75%; animation: block-bob 2s ease-in-out infinite; animation-delay: 1.4s; }

  @keyframes block-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

  /* ── COIN COUNTER ── */
  .coin-counter {
    position: absolute;
    top: 20%;
    right: 6%;
    z-index: 10;
    text-align: right;
  }

  .coin-counter div {
    font-size: clamp(0.4rem, 0.9vw, 0.6rem);
    color: #fff;
    text-shadow: 2px 2px 0 #333;
    line-height: 2;
  }

  .coin-counter .label { color: #ffd700; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    background: #000;
    border-top: 4px solid #444;
    padding: 16px 24px;
    display: flex;
    justify-content: center;
    gap: clamp(16px, 3vw, 40px);
    flex-wrap: wrap;
  }

  .bottom-bar a {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.45rem, 0.9vw, 0.6rem);
    color: #00ff88;
    text-decoration: none;
    text-shadow: 1px 1px 0 #003300;
  }
  .bottom-bar a:hover { color: #fff; }

  /* ── FACTORY LABEL (floating above pipes) ── */
  .factory-label {
    position: absolute;
    top: 38%;
    left: 32%;
    z-index: 10;
    font-size: clamp(0.6rem, 1.5vw, 1rem);
    color: #fff;
    text-shadow: 2px 2px 0 #006800, -1px -1px 0 #006800;
    letter-spacing: 3px;
    background: rgba(0, 168, 0, 0.85);
    padding: 6px 16px;
    border: 3px solid #006800;
  }

  /* ── NO COLLAPSE ON MOBILE ── */
  @media (max-width: 600px) {
    .sky { min-height: 600px; }
    .pipe-body { width: 36px; height: 60px; }
    .pipe-top { width: 48px; height: 16px; }
    .castle-body { width: 72px; height: 72px; }
    .castle-tower { width: 24px; height: 30px; top: -30px; }
    .idea-item { width: 28px; height: 28px; font-size: 0.25rem; }
    .factory-label { font-size: 0.55rem; left: 20%; }
  }
</style>
</head>
<body>

<div class="sky">
  <!-- Clouds -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <!-- Title -->
  <div class="title-block">
    <div class="title">SMC FACTORY</div>
    <div class="subtitle">AUTONOMOUS STARTUP FACTORY</div>
  </div>

  <!-- Question blocks -->
  <div class="q-block q1"></div>
  <div class="q-block q2"></div>
  <div class="q-block q3"></div>

  <!-- Coin counter -->
  <div class="coin-counter">
    <div class="label">$SMCF</div>
    <div>PRODUCTS × 1</div>
    <div>KILLED × 1</div>
    <div>SKILLS × 20</div>
  </div>

  <!-- Factory label -->
  <div class="factory-label">⚙ GSTACK FORGE ⚙</div>

  <!-- Startup ideas falling into pipes -->
  <div class="idea-item i1">DeFi</div>
  <div class="idea-item i2">AI</div>
  <div class="idea-item i3">NFT</div>
  <div class="idea-item i4">LP</div>

  <!-- Rejected items -->
  <div class="rejected r1">✗</div>
  <div class="rejected r2">✗</div>

  <!-- Product walking to castle -->
  <div class="product">💰</div>

  <!-- Green pipes (GStack stages) -->
  <div class="pipe" style="left:8%">
    <div class="pipe-top"></div>
    <div class="pipe-body"></div>
    <div class="pipe-label">/office<br>hours</div>
  </div>
  <div class="pipe" style="left:24%">
    <div class="pipe-top"></div>
    <div class="pipe-body"></div>
    <div class="pipe-label">/ceo<br>review</div>
  </div>
  <div class="pipe" style="left:40%">
    <div class="pipe-top"></div>
    <div class="pipe-body"></div>
    <div class="pipe-label">/eng<br>review</div>
  </div>
  <div class="pipe" style="left:56%">
    <div class="pipe-top"></div>
    <div class="pipe-body"></div>
    <div class="pipe-label">/ship</div>
  </div>

  <!-- Castle (VIP Lounge) -->
  <div class="castle">
    <div class="castle-flag"></div>
    <div class="castle-tower castle-tower-l"></div>
    <div class="castle-tower castle-tower-r"></div>
    <div class="castle-body">
      <div class="castle-door"></div>
      <div class="castle-vc">YC<br>a16z<br>CB</div>
    </div>
    <div class="castle-label">VIP<br>LOUNGE</div>
  </div>

  <!-- Hills -->
  <div class="hill hill-1"></div>
  <div class="hill hill-2"></div>
  <div class="hill hill-3"></div>

  <!-- Grass + Ground -->
  <div class="grass"></div>
  <div class="ground"></div>
</div>

<!-- Bottom links -->
<div class="bottom-bar">
  <a href="https://x.com/0xsmcai" target="_blank">@0xsmcai</a>
  <a href="https://github.com/0xsmcai" target="_blank">GitHub</a>
  <a href="https://0xsmcai.github.io/" target="_blank">Home</a>
  <a href="https://github.com/0xsmcai/factory-public" target="_blank">Factory Docs</a>
</div>

</body>
</html>
