<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC Factory — Autonomous Startup Factory</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Press Start 2P', monospace;
    overflow-x: hidden;
    background: #5c94fc;
    min-height: 100vh;
  }

  /* ── SKY ── */
  .sky {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 640px;
    background: linear-gradient(180deg, #5c94fc 0%, #88b4fc 50%, #a4d4fc 100%);
    overflow: hidden;
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: #fff;
  }
  .cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; }
  .cloud-1 { width: 80px; height: 28px; top: 6%; left: 10%; animation: drift 30s linear infinite; }
  .cloud-1::before { width: 40px; height: 20px; top: -14px; left: 12px; }
  .cloud-1::after { width: 28px; height: 16px; top: -10px; left: 40px; }
  .cloud-2 { width: 60px; height: 24px; top: 10%; left: 60%; animation: drift 35s linear infinite; animation-delay: -10s; }
  .cloud-2::before { width: 32px; height: 18px; top: -12px; left: 8px; }
  .cloud-2::after { width: 24px; height: 14px; top: -8px; left: 28px; }
  .cloud-3 { width: 70px; height: 26px; top: 4%; left: 85%; animation: drift 25s linear infinite; animation-delay: -5s; }
  .cloud-3::before { width: 36px; height: 18px; top: -12px; left: 10px; }
  .cloud-3::after { width: 28px; height: 14px; top: -10px; left: 34px; }

  @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-120vw); } }

  /* ── TITLE ── */
  .title-block {
    position: absolute;
    top: 3%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    width: 90%;
  }

  .title {
    font-size: clamp(1.2rem, 4vw, 2.4rem);
    color: #fff;
    text-shadow: 3px 3px 0 #222, -1px -1px 0 #222;
    letter-spacing: 4px;
  }

  .subtitle {
    font-size: clamp(0.5rem, 1.4vw, 0.8rem);
    color: #ffd700;
    text-shadow: 2px 2px 0 #333;
    margin-top: 8px;
    letter-spacing: 2px;
  }

  /* ── STATS (replaces coin counter — better for mobile) ── */
  .stats {
    position: absolute;
    top: 14%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: clamp(8px, 3vw, 24px);
    z-index: 10;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat {
    background: rgba(0, 0, 0, 0.6);
    padding: 6px 12px;
    font-size: clamp(0.45rem, 1vw, 0.6rem);
    color: #ffd700;
    text-shadow: 1px 1px 0 #000;
    white-space: nowrap;
  }

  /* ── GROUND ── */
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80px;
    background: #c84c0c;
    border-top: 8px solid #e09040;
  }
  .ground::before {
    content: '';
    position: absolute;
    top: -8px;
    width: 100%;
    height: 8px;
    background: repeating-linear-gradient(90deg, #e09040 0px, #e09040 32px, #c84c0c 32px, #c84c0c 64px);
  }

  .grass {
    position: absolute;
    bottom: 80px;
    width: 100%;
    height: 20px;
    background: #00a800;
    border-top: 4px solid #30d030;
  }

  /* ── HILLS ── */
  .hill {
    position: absolute;
    bottom: 100px;
    border-radius: 50% 50% 0 0;
    background: #30a030;
  }
  .hill-1 { width: clamp(100px, 20vw, 200px); height: clamp(40px, 8vw, 80px); left: 3%; }
  .hill-2 { width: clamp(80px, 14vw, 140px); height: clamp(32px, 6vw, 56px); left: 68%; }

  /* ── PIPE GROUP (GStack stages) ── */
  .pipe-group {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: clamp(16px, 4vw, 48px);
    z-index: 5;
    align-items: flex-end;
  }

  .pipe {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .pipe-top {
    width: clamp(40px, 7vw, 60px);
    height: clamp(14px, 2vw, 20px);
    background: #00c800;
    border: 3px solid #006800;
  }

  .pipe-body {
    width: clamp(32px, 5.5vw, 48px);
    height: clamp(48px, 8vw, 80px);
    background: #00a800;
    border: 3px solid #006800;
    border-top: none;
  }

  .pipe-label {
    text-align: center;
    font-size: clamp(0.4rem, 1vw, 0.55rem);
    color: #fff;
    text-shadow: 1px 1px 0 #333;
    margin-top: 6px;
    line-height: 1.6;
  }

  .pipe-skills {
    font-size: clamp(0.3rem, 0.7vw, 0.4rem);
    color: #000;
    text-align: center;
    margin-top: 2px;
    line-height: 1.4;
  }

  /* Variable pipe heights for visual interest */
  .pipe:nth-child(1) .pipe-body { height: clamp(48px, 8vw, 80px); }
  .pipe:nth-child(2) .pipe-body { height: clamp(64px, 10vw, 100px); }
  .pipe:nth-child(3) .pipe-body { height: clamp(56px, 9vw, 90px); }
  .pipe:nth-child(4) .pipe-body { height: clamp(72px, 11vw, 110px); }

  /* ── CASTLE ── */
  .castle {
    position: absolute;
    right: clamp(8px, 3vw, 40px);
    bottom: 100px;
    z-index: 5;
  }

  .castle-body {
    width: clamp(64px, 10vw, 100px);
    height: clamp(64px, 10vw, 100px);
    background: #e0a060;
    border: 3px solid #c08040;
    position: relative;
  }

  .castle-door {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: clamp(18px, 3vw, 28px);
    height: clamp(24px, 4vw, 36px);
    background: #333;
    border-radius: 50% 50% 0 0;
  }

  .castle-tower {
    position: absolute;
    top: clamp(-24px, -3vw, -40px);
    width: clamp(20px, 3vw, 32px);
    height: clamp(24px, 3vw, 40px);
    background: #e0a060;
    border: 3px solid #c08040;
  }
  .castle-tower-l { left: -2px; }
  .castle-tower-r { right: -2px; }

  .castle-flag {
    position: absolute;
    top: clamp(-40px, -5vw, -60px);
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: clamp(16px, 2vw, 24px);
    background: #333;
  }
  .castle-flag::after {
    content: '';
    position: absolute;
    top: 0;
    left: 3px;
    width: 12px;
    height: 8px;
    background: #ff4444;
  }

  .castle-label {
    text-align: center;
    font-size: clamp(0.4rem, 0.9vw, 0.55rem);
    color: #fff;
    text-shadow: 1px 1px 0 #333;
    margin-top: 6px;
    line-height: 1.8;
  }

  .castle-vc {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(0.35rem, 0.7vw, 0.45rem);
    color: #ffd700;
    text-shadow: 1px 1px 0 #333;
    text-align: center;
    line-height: 2.2;
    white-space: nowrap;
  }

  /* ── IDEA ITEMS (falling directly into pipes) ── */
  .idea-item {
    position: absolute;
    z-index: 8;
    width: clamp(32px, 5vw, 44px);
    height: clamp(32px, 5vw, 44px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.35rem, 0.8vw, 0.45rem);
    color: #fff;
    text-shadow: 1px 1px 0 #000;
    text-align: center;
    border: 3px solid;
    opacity: 0;
  }

  /* Each idea aligns with its pipe and falls into it */
  .pipe-group { --pipe-gap: clamp(16px, 4vw, 48px); }

  .idea-item.i1 { background: rgba(92,148,252,0.9); border-color: #4488ff; animation: drop1 6s ease-in infinite; animation-delay: 0s; }
  .idea-item.i2 { background: rgba(170,68,255,0.9); border-color: #aa44ff; animation: drop2 6s ease-in infinite; animation-delay: 1.5s; }
  .idea-item.i3 { background: rgba(255,170,0,0.9); border-color: #ffaa00; animation: drop3 6s ease-in infinite; animation-delay: 3s; }
  .idea-item.i4 { background: rgba(0,200,100,0.9); border-color: #00c864; animation: drop4 6s ease-in infinite; animation-delay: 4.5s; }

  /* Pipe positions: centered flex with 4 items. Approximate % positions for each pipe */
  @keyframes drop1 {
    0% { left: 22%; top: 18%; opacity: 0; transform: scale(1); }
    10% { opacity: 1; }
    60% { left: 22%; top: calc(100% - 210px); opacity: 1; transform: scale(1); }
    75% { top: calc(100% - 190px); opacity: 0.6; transform: scale(0.7); }
    85% { opacity: 0; transform: scale(0.3); }
    100% { opacity: 0; }
  }
  @keyframes drop2 {
    0% { left: 36%; top: 18%; opacity: 0; transform: scale(1); }
    10% { opacity: 1; }
    60% { left: 36%; top: calc(100% - 230px); opacity: 1; transform: scale(1); }
    75% { top: calc(100% - 210px); opacity: 0.6; transform: scale(0.7); }
    85% { opacity: 0; transform: scale(0.3); }
    100% { opacity: 0; }
  }
  @keyframes drop3 {
    0% { left: 50%; top: 18%; opacity: 0; transform: scale(1); }
    10% { opacity: 1; }
    60% { left: 50%; top: calc(100% - 220px); opacity: 1; transform: scale(1); }
    75% { top: calc(100% - 200px); opacity: 0.6; transform: scale(0.7); }
    85% { opacity: 0; transform: scale(0.3); }
    100% { opacity: 0; }
  }
  @keyframes drop4 {
    0% { left: 64%; top: 18%; opacity: 0; transform: scale(1); }
    10% { opacity: 1; }
    60% { left: 64%; top: calc(100% - 240px); opacity: 1; transform: scale(1); }
    75% { top: calc(100% - 220px); opacity: 0.6; transform: scale(0.7); }
    85% { opacity: 0; transform: scale(0.3); }
    100% { opacity: 0; }
  }

  /* ── PRODUCT (walks to castle) ── */
  .product {
    position: absolute;
    bottom: 104px;
    z-index: 8;
    width: clamp(24px, 3.5vw, 32px);
    height: clamp(24px, 3.5vw, 32px);
    background: #ffd700;
    border: 3px solid #cc9900;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.7rem, 1.2vw, 1rem);
    animation: walk-to-castle 10s linear infinite;
    opacity: 0;
  }

  @keyframes walk-to-castle {
    0% { right: 45%; opacity: 0; }
    10% { right: 45%; opacity: 1; }
    75% { right: clamp(80px, 14vw, 150px); opacity: 1; }
    85% { right: clamp(70px, 12vw, 130px); opacity: 0.5; }
    90% { opacity: 0; }
    100% { opacity: 0; }
  }

  /* ── REJECTED ── */
  .rejected {
    position: absolute;
    z-index: 8;
    width: clamp(20px, 3vw, 28px);
    height: clamp(20px, 3vw, 28px);
    background: #ff4444;
    border: 3px solid #cc2222;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.4rem, 0.8vw, 0.6rem);
    color: #fff;
    animation: reject 8s ease-in infinite;
    opacity: 0;
  }

  .rejected.r1 { left: 25%; animation-delay: 3s; }
  .rejected.r2 { left: 45%; animation-delay: 7s; }

  @keyframes reject {
    0% { bottom: 200px; opacity: 0; transform: rotate(0); }
    10% { opacity: 1; }
    25% { bottom: 240px; transform: rotate(0); }
    50% { bottom: 100px; transform: rotate(180deg); opacity: 0.5; }
    60% { bottom: 60px; opacity: 0; }
    100% { opacity: 0; }
  }

  /* ── QUESTION BLOCKS ── */
  .q-block {
    position: absolute;
    width: clamp(28px, 4vw, 36px);
    height: clamp(28px, 4vw, 36px);
    background: #e09040;
    border: 3px solid #c87020;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.6rem, 1vw, 0.9rem);
    color: #fff;
    text-shadow: 1px 1px 0 #333;
    z-index: 3;
  }
  .q-block::after { content: '?'; }
  .q1 { top: 30%; left: 12%; animation: bob 2s ease-in-out infinite; }
  .q2 { top: 34%; left: 44%; animation: bob 2s ease-in-out infinite; animation-delay: 0.7s; }
  .q3 { top: 28%; left: 78%; animation: bob 2s ease-in-out infinite; animation-delay: 1.4s; }

  @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  /* ── GSTACK FORGE LABEL (on ground/orange area) ── */
  .forge-label {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: clamp(0.7rem, 1.8vw, 1.2rem);
    color: #e09040;
    text-shadow: none;
    background: transparent;
    padding: 8px clamp(12px, 2vw, 20px);
    border: 3px solid #e09040;
    white-space: nowrap;
    letter-spacing: 3px;
  }

  /* ── RED CARPET ── */
  .carpet {
    position: absolute;
    bottom: 80px;
    right: 0;
    width: clamp(80px, 16vw, 200px);
    height: 20px;
    background: #881122;
    border-top: 3px solid #bb2244;
    z-index: 4;
  }

  /* ── MONEY PARTICLES ── */
  .money {
    position: absolute;
    font-size: clamp(0.8rem, 1.5vw, 1.2rem);
    opacity: 0;
    z-index: 6;
    animation: float-money 5s ease-out infinite;
  }
  .money-1 { right: 10%; bottom: 240px; animation-delay: 0s; }
  .money-2 { right: 16%; bottom: 200px; animation-delay: 2s; }
  .money-3 { right: 6%; bottom: 260px; animation-delay: 3.5s; }

  @keyframes float-money {
    0% { opacity: 0; transform: translateY(0); }
    20% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-50px) translateX(8px); }
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    background: #000;
    border-top: 4px solid #444;
    padding: 16px 20px;
    display: flex;
    justify-content: center;
    gap: clamp(12px, 3vw, 32px);
    flex-wrap: wrap;
  }

  .bottom-bar a {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.5rem, 1.1vw, 0.65rem);
    color: #00ff88;
    text-decoration: none;
    text-shadow: 1px 1px 0 #003300;
    padding: 8px 4px;
    min-height: 44px;
    display: flex;
    align-items: center;
  }
  .bottom-bar a:hover { color: #fff; }
</style>
</head>
<body>

<div class="sky">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <div class="title-block">
    <div class="title">SMC FACTORY</div>
    <div class="subtitle">AUTONOMOUS STARTUP FACTORY</div>
  </div>

  <div class="stats">
    <div class="stat">$SMCF</div>
    <div class="stat">SHIPPED: 1</div>
    <div class="stat">KILLED: 1</div>
    <div class="stat">SKILLS: 20+</div>
  </div>

  <div class="q-block q1"></div>
  <div class="q-block q2"></div>
  <div class="q-block q3"></div>

  <div class="forge-label">GSTACK FORGE</div>

  <div class="idea-item i1">startup</div>
  <div class="idea-item i2">startup</div>
  <div class="idea-item i3">startup</div>
  <div class="idea-item i4">startup</div>

  <div class="rejected r1">X</div>
  <div class="rejected r2">X</div>

  <div class="product">$</div>

  <div class="pipe-group">
    <div class="pipe">
      <div class="pipe-top"></div>
      <div class="pipe-body"></div>
      <div class="pipe-label">/office-hours</div>
      <div class="pipe-skills">validate<br>demand</div>
    </div>
    <div class="pipe">
      <div class="pipe-top"></div>
      <div class="pipe-body"></div>
      <div class="pipe-label">/ceo-review</div>
      <div class="pipe-skills">scope<br>strategy</div>
    </div>
    <div class="pipe">
      <div class="pipe-top"></div>
      <div class="pipe-body"></div>
      <div class="pipe-label">/eng-review</div>
      <div class="pipe-skills">architecture<br>tests</div>
    </div>
    <div class="pipe">
      <div class="pipe-top"></div>
      <div class="pipe-body"></div>
      <div class="pipe-label">/ship</div>
      <div class="pipe-skills">deploy<br>launch</div>
    </div>
  </div>

  <div class="castle">
    <div class="castle-flag"></div>
    <div class="castle-tower castle-tower-l"></div>
    <div class="castle-tower castle-tower-r"></div>
    <div class="castle-body">
      <div class="castle-door"></div>
      <div class="castle-vc">YC<br>a16z<br>CB</div>
    </div>
    <div class="castle-label">VIP<br>LOUNGE</div>
  </div>

  <div class="carpet"></div>

  <div class="money money-1">$</div>
  <div class="money money-2">$</div>
  <div class="money money-3">$</div>

  <div class="hill hill-1"></div>
  <div class="hill hill-2"></div>
  <div class="grass"></div>
  <div class="ground"></div>
</div>

<div class="bottom-bar">

</div>

</body>
</html>
