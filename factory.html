<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC Factory — Autonomous Startup Factory</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: linear-gradient(180deg, #0a0a12 0%, #06060a 100%);
    color: #ddd8d0;
    min-height: 100vh;
    overflow: hidden;
  }

  body {
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    position: relative;
  }

  /* ── ASCII art container ── */
  #ascii-art {
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 14px;
    background: rgba(0,0,0,0.4);
    overflow: hidden;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 4px 20px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
  }

  .art-row {
    white-space: pre;
    font-family: Georgia, Palatino, "Times New Roman", serif;
    font-size: 13px;
  }

  /* Font weight classes */
  .w3 { font-weight: 300; }
  .w5 { font-weight: 500; }
  .w8 { font-weight: 800; }
  .it { font-style: italic; }

  /* Brightness/opacity classes — golden amber */
  .a1 { color: rgba(196,163,90,0.10); }
  .a2 { color: rgba(196,163,90,0.20); }
  .a3 { color: rgba(196,163,90,0.30); }
  .a4 { color: rgba(196,163,90,0.40); }
  .a5 { color: rgba(196,163,90,0.50); }
  .a6 { color: rgba(196,163,90,0.60); }
  .a7 { color: rgba(196,163,90,0.70); }
  .a8 { color: rgba(196,163,90,0.80); }
  .a9 { color: rgba(196,163,90,0.90); }
  .a10 { color: rgba(196,163,90,1.0); }

  /* ── CTA button ── */
  .cta-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
  }

  .cta-btn {
    display: inline-block;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 1.4vw, 14px);
    color: #fff;
    background: rgba(0,0,0,0.7);
    border: 2px solid rgba(196,163,90,0.6);
    padding: 16px 32px;
    text-decoration: none;
    text-shadow: 0 0 8px rgba(196,163,90,0.5);
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 2px;
    min-height: 44px;
  }

  .cta-btn:hover {
    background: rgba(196,163,90,0.15);
    border-color: rgba(196,163,90,0.9);
    box-shadow: 0 0 20px rgba(196,163,90,0.3);
  }

  /* ── Scanline overlay ── */
  .scanlines {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 5;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ── Credit ── */
  .credit {
    position: fixed;
    bottom: 12px;
    right: 16px;
    font: 400 9px/1 'Press Start 2P', monospace;
    color: rgba(255,255,255,0.08);
    z-index: 6;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    #ascii-art { padding: 8px; }
    .art-row { font-size: 8px; }
    .cta-btn { font-size: 9px; padding: 12px 20px; }
  }
</style>
</head>
<body>

  <div id="ascii-art"></div>

  <div class="cta-wrap">
    <a class="cta-btn" href="about.html">ENTER THE FACTORY</a>
  </div>

  <div class="scanlines"></div>
  <div class="credit">Built with pretext</div>

  <script type="module" src="./factory-splash.js"></script>
</body>
</html>
