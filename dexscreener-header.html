<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1500px;
    height: 500px;
    background: #0a0a0a;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 80px;
    z-index: 1;
  }

  /* Left side — SMCF branding */
  .brand {
    text-align: center;
  }

  .ticker {
    font-size: 120px;
    font-weight: bold;
    color: #00ff88;
    letter-spacing: 12px;
    text-shadow: 0 0 30px rgba(0, 255, 136, 0.4), 0 0 60px rgba(0, 255, 136, 0.15);
  }

  .name {
    font-size: 24px;
    color: #666;
    letter-spacing: 8px;
    margin-top: 8px;
  }

  .tagline {
    font-size: 16px;
    color: #444;
    margin-top: 16px;
    letter-spacing: 2px;
  }

  /* Divider */
  .divider {
    width: 2px;
    height: 300px;
    background: linear-gradient(transparent, #222, #222, transparent);
  }

  /* Right side — factory conveyor */
  .factory {
    display: flex;
    flex-direction: column;
    gap: 20px;
    font-size: 14px;
  }

  .conveyor-label {
    color: #444;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .conveyor {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .input-box {
    border: 1px solid #333;
    padding: 10px 16px;
    color: #666;
    background: #0f0f0f;
    font-size: 13px;
    font-family: 'Courier New', monospace;
  }

  .arrow {
    color: #00ff88;
    font-size: 20px;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
  }

  .process-box {
    border: 1px solid #00ff88;
    padding: 10px 16px;
    color: #00ff88;
    background: rgba(0, 255, 136, 0.05);
    font-size: 13px;
    font-family: 'Courier New', monospace;
  }

  .output-box {
    border: 1px solid #ffaa00;
    padding: 10px 16px;
    color: #ffaa00;
    background: rgba(255, 170, 0, 0.05);
    font-size: 13px;
    font-family: 'Courier New', monospace;
  }

  .status-bar {
    display: flex;
    gap: 24px;
    margin-top: 10px;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #444;
  }

  .dot {
    width: 6px;
    height: 6px;
  }
  .dot-green { background: #00ff88; box-shadow: 0 0 4px #00ff88; }
  .dot-yellow { background: #ffaa00; }

  /* Base chain badge */
  .chain-badge {
    position: absolute;
    bottom: 30px;
    right: 40px;
    color: #333;
    font-size: 13px;
    letter-spacing: 2px;
  }

  .chain-badge span { color: #0052ff; }
</style>
</head>
<body>

<div class="container">
  <div class="brand">
    <div class="ticker">SMCF</div>
    <div class="name">SMC FACTORY</div>
    <div class="tagline">autonomous startup factory</div>
  </div>

  <div class="divider"></div>

  <div class="factory">
    <div class="conveyor-label">pipeline</div>

    <div class="conveyor">
      <div class="input-box">X posts</div>
      <div class="arrow">→</div>
      <div class="input-box">APIs</div>
      <div class="arrow">→</div>
      <div class="input-box">DeFi signals</div>
      <div class="arrow">→</div>
      <div class="process-box">DISCOVER</div>
      <div class="arrow">→</div>
      <div class="process-box">VALIDATE</div>
      <div class="arrow">→</div>
      <div class="process-box">BUILD</div>
      <div class="arrow">→</div>
      <div class="output-box">$ SHIP $</div>
    </div>

    <div class="conveyor-label">skills invoked</div>

    <div class="conveyor">
      <div class="input-box">/office-hours</div>
      <div class="input-box">/ceo-review</div>
      <div class="input-box">/eng-review</div>
      <div class="input-box">/cso</div>
      <div class="input-box">/qa</div>
      <div class="input-box">/ship</div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="dot dot-green"></div> ONLINE</div>
      <div class="status-item"><div class="dot dot-yellow"></div> 20+ GStack skills</div>
      <div class="status-item"><div class="dot dot-green"></div> zero human input</div>
      <div class="status-item"><div class="dot dot-green"></div> self-improving</div>
    </div>
  </div>
</div>

<div class="chain-badge">built on <span>Base</span></div>

</body>
</html>
